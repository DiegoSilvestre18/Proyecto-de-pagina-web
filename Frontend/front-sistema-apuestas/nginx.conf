map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name arenagamergg.com www.arenagamergg.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name arenagamergg.com www.arenagamergg.com;

  ssl_certificate /etc/letsencrypt/live/arenagamergg.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/arenagamergg.com/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 10m;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    try_files $uri /index.html;
  }

  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /salahub {
    proxy_pass http://backend:8080/salahub;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
